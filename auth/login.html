<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - School Registration System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['DM Serif Display', 'serif'],
          },
          colors: {
            brand: {50: '#f9fafb',100: '#f3f4f6',200: '#e5e7eb',300: '#d1d5db',400: '#9ca3af',500: '#000000',600: '#000000',700: '#000000',800: '#000000',900: '#000000'}
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --brand: #000000;
      --brand-light: #1a1a1a;
      --brand-dark: #000000;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f3f0;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .dark body, body.dark-mode {
      background: #0f0d0c;
      color: #f0ebe8;
    }

    .glass-card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
      transition: box-shadow 0.25s;
    }

    .dark .glass-card {
      background: rgba(30,22,18,0.72);
      border: 1px solid rgba(26,26,26,0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn-brand{background:#000000;
      color: white;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .btn-brand:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    }

    .btn-brand:active { transform: translateY(0); }

    input:focus, select:focus {
      outline: none;
      border-color: #000000;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.12);
    }

    .dark input, .dark select {
      background: rgba(30,22,18,0.6);
      border-color: rgba(26,26,26,0.2);
      color: #f0ebe8;
    }

    .dark input::placeholder { color: #8a7a74; }

    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .mesh-bg::before, .mesh-bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
    }

    .mesh-bg::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a1a1a 0%, transparent 70%);
      top: -100px; right: -100px;
    }

    .mesh-bg::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #000000 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }

    .dark .mesh-bg::before { opacity: 0.12; }
    .dark .mesh-bg::after { opacity: 0.1; }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(0,0,0,0.1);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255,255,255,0.8);
      color: #1e1612;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .dark .form-input {
      background: rgba(30,22,18,0.6);
      border-color: rgba(26,26,26,0.2);
      color: #f0ebe8;
    }

    .toggle-switch {
      width: 44px; height: 24px;
      background: rgba(0,0,0,0.2);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.active { background: #000000; }

    .toggle-switch .knob {
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: transform 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle-switch.active .knob { transform: translateX(20px); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card { animation: fadeIn 0.5s ease; }
  </style>
</head>
<body id="body-root">

<div class="mesh-bg"></div>

<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8 auth-card">
      <div class="w-16 h-16 rounded-2xl btn-brand flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <h1 class="font-display text-3xl text-gray-900 dark:text-white mb-2">Welcome Back</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">Sign in to access the school system</p>
    </div>

    <!-- Login Card -->
    <div class="glass-card rounded-3xl p-8 auth-card" style="animation-delay: 0.1s">
      <form id="login-form" class="space-y-5">
        <!-- Google Sign In -->
        <div id="google-signin-button"></div>
        <button type="button" id="google-signin-custom" onclick="handleGoogleSignIn()" class="w-full py-3 px-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600 transition-colors flex items-center justify-center gap-3 bg-white dark:bg-gray-800">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="font-semibold text-gray-700 dark:text-gray-300">Continue with Google</span>
        </button>

        <!-- Divider -->
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white/50 dark:bg-gray-900/50 text-gray-500 dark:text-gray-400">Or sign in with email</span>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email</label>
          <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <input type="email" id="email" placeholder="you@example.com" class="form-input pl-12" autocomplete="email" required />
          </div>
          <p class="text-red-400 text-xs mt-1.5 hidden" id="err-email">Please enter a valid email</p>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Password</label>
          <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <input type="password" id="password" placeholder="••••••••" class="form-input pl-12 pr-12" autocomplete="current-password" required />
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
              <svg id="eye-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p class="text-red-400 text-xs mt-1.5 hidden" id="err-password">Password is required</p>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between">
          <label for="remember-me" class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 focus:ring-offset-0 cursor-pointer" />
            <span class="text-sm text-gray-600 dark:text-gray-400">Remember me</span>
          </label>
          <a href="#" onclick="alert('Password reset coming soon!'); return false;" class="text-sm font-semibold text-brand-500 hover:text-brand-600 dark:text-brand-400 dark:hover:text-brand-300">
            Forgot password?
          </a>
        </div>

        <!-- Error Message -->
        <div id="login-error" class="hidden p-3 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800">
          <p class="text-red-600 dark:text-red-400 text-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span id="login-error-text">Invalid credentials</span>
          </p>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full btn-brand py-3.5 rounded-2xl font-semibold text-base">
          Sign in
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="mt-6 text-center">
        <span class="text-sm text-gray-600 dark:text-gray-400">Don't have an account? </span>
        <a href="signup.html" class="text-sm font-semibold text-brand-500 hover:text-brand-600 dark:text-brand-400 dark:hover:text-brand-300">
          Sign up
        </a>
      </div>

      <!-- Back to Home -->
      <div class="mt-4 text-center">
        <a href="../index.html" class="text-sm text-gray-500 hover:text-brand-500 dark:text-gray-400 dark:hover:text-brand-400 inline-flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to home
        </a>
      </div>
    </div>

    <!-- Dark Mode Toggle -->
    <div class="flex items-center justify-center gap-3 mt-6">
      <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 14a6 6 0 110-12 6 6 0 010 12z"/>
      </svg>
      <div class="toggle-switch" id="dark-toggle" onclick="toggleDark()">
        <div class="knob"></div>
      </div>
      <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
      </svg>
    </div>
  </div>
</div>

<!-- Supabase JS (Self-Hosted) -->
<script src="../js/supabase.min.js"></script>

<!-- Supabase Configuration -->
<script src="../js/supabase-config.js"></script>
<script src="../js/supabase-auth.js"></script>

<!-- App Scripts -->
<script src="../js/auth.js"></script>

</body>
</html>
