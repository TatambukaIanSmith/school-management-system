<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exams - School System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-50 font-sans">

<nav class="bg-white shadow-sm border-b">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <span class="font-bold text-xl text-orange-600">📚 Exams</span>
      <div class="flex gap-4">
        <a href="dashboard.html" class="text-gray-600 hover:text-gray-900">Dashboard</a>
        <a href="index.html" class="text-gray-600 hover:text-gray-900">Students</a>
        <a href="exams-simple.html" class="text-orange-600 font-semibold">Exams</a>
      </div>
    </div>
    <div id="user-info" class="text-sm text-gray-600"></div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-8">Exam Management</h1>

  <!-- Tabs -->
  <div class="flex gap-4 mb-6">
    <button onclick="showTab('list')" id="tab-list" class="px-6 py-2 rounded-lg bg-orange-600 text-white font-semibold">My Exams</button>
    <button onclick="showTab('create')" id="tab-create" class="px-6 py-2 rounded-lg bg-gray-200 text-gray-700 font-semibold">Create Exam</button>
    <button onclick="showTab('grade')" id="tab-grade" class="px-6 py-2 rounded-lg bg-gray-200 text-gray-700 font-semibold">Grade</button>
  </div>

  <!-- List View -->
  <div id="view-list" class="bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-bold mb-4">My Exams</h2>
    <div id="exams-list"></div>
  </div>

  <!-- Create View -->
  <div id="view-create" class="hidden">
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-2xl font-bold mb-4">Create New Exam</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="text" id="exam-title" placeholder="Exam Title" class="border rounded-lg px-4 py-2" />
        <input type="text" id="exam-subject" placeholder="Subject" class="border rounded-lg px-4 py-2" />
        <select id="exam-class" class="border rounded-lg px-4 py-2">
          <option value="">Select Class</option>
          <option>Senior 1</option>
          <option>Senior 2</option>
          <option>Senior 3</option>
          <option>Senior 4</option>
          <option>Senior 5</option>
          <option>Senior 6</option>
        </select>
        <input type="number" id="exam-duration" placeholder="Duration (minutes)" class="border rounded-lg px-4 py-2" />
        <input type="number" id="exam-marks" placeholder="Total Marks" class="border rounded-lg px-4 py-2" />
        <input type="datetime-local" id="exam-due" class="border rounded-lg px-4 py-2" />
      </div>
      <textarea id="exam-instructions" placeholder="Instructions" rows="3" class="w-full border rounded-lg px-4 py-2 mb-4"></textarea>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">Questions</h3>
        <button onclick="addQuestion()" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-semibold">+ Add Question</button>
      </div>
      <div id="questions-container"></div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveExam()" class="bg-orange-600 text-white px-6 py-3 rounded-lg font-semibold">Save Exam</button>
        <button onclick="showTab('list')" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-semibold">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Grade View -->
  <div id="view-grade" class="hidden bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-bold mb-4">Student Submissions</h2>
    <div id="submissions-list"></div>
  </div>
</main>

<script>
const EXAMS_KEY = 'srs_exams';
const SUBMISSIONS_KEY = 'srs_submissions';
const SESSION_KEY = 'srs_session';

let currentUser = null;
let exams = [];
let submissions = [];
let questionCount = 0;

document.addEventListener('DOMContentLoaded', () => {
  currentUser = JSON.parse(localStorage.getItem(SESSION_KEY) || '{}');
  if (!currentUser.userId) {
    window.location.href = 'login.html';
    return;
  }
  
  document.getElementById('user-info').textContent = currentUser.fullName;
  exams = JSON.parse(localStorage.getItem(EXAMS_KEY) || '[]');
  submissions = JSON.parse(localStorage.getItem(SUBMISSIONS_KEY) || '[]');
  showTab('list');
});

function showTab(tab) {
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-create').classList.add('hidden');
  document.getElementById('view-grade').classList.add('hidden');
  
  ['tab-list', 'tab-create', 'tab-grade'].forEach(id => {
    document.getElementById(id).className = 'px-6 py-2 rounded-lg bg-gray-200 text-gray-700 font-semibold';
  });
  
  if (tab === 'list') {
    document.getElementById('view-list').classList.remove('hidden');
    document.getElementById('tab-list').className = 'px-6 py-2 rounded-lg bg-orange-600 text-white font-semibold';
    renderExamsList();
  } else if (tab === 'create') {
    document.getElementById('view-create').classList.remove('hidden');
    document.getElementById('tab-create').className = 'px-6 py-2 rounded-lg bg-orange-600 text-white font-semibold';
    questionCount = 0;
    document.getElementById('questions-container').innerHTML = '';
  } else if (tab === 'grade') {
    document.getElementById('view-grade').classList.remove('hidden');
    document.getElementById('tab-grade').className = 'px-6 py-2 rounded-lg bg-orange-600 text-white font-semibold';
    renderSubmissions();
  }
}

function renderExamsList() {
  const myExams = exams.filter(e => e.createdBy === currentUser.userId);
  const container = document.getElementById('exams-list');
  
  if (myExams.length === 0) {
    container.innerHTML = '<p class="text-gray-500 text-center py-8">No exams yet. Create your first exam!</p>';
    return;
  }
  
  container.innerHTML = myExams.map(exam => {
    const subs = submissions.filter(s => s.examId === exam.id).length;
    return `
      <div class="border rounded-lg p-4 mb-4 hover:shadow-md transition">
        <div class="flex justify-between items-start">
          <div>
            <h3 class="font-bold text-lg">${exam.title}</h3>
            <p class="text-sm text-gray-600">${exam.subject} • ${exam.class} • ${exam.duration} mins • ${exam.totalMarks} marks</p>
            <p class="text-xs text-gray-500 mt-1">Due: ${new Date(exam.dueDate).toLocaleString()}</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold text-orange-600">${subs} submissions</p>
            <button onclick="deleteExam('${exam.id}')" class="text-red-600 text-sm mt-2">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function addQuestion() {
  questionCount++;
  const container = document.getElementById('questions-container');
  const div = document.createElement('div');
  div.className = 'border rounded-lg p-4 mb-4';
  div.innerHTML = `
    <div class="flex justify-between items-center mb-3">
      <h4 class="font-semibold">Question ${questionCount}</h4>
      <button onclick="this.parentElement.parentElement.remove()" class="text-red-600 text-sm">Remove</button>
    </div>
    <input type="text" placeholder="Question text" class="w-full border rounded px-3 py-2 mb-2 question-text" />
    <select class="border rounded px-3 py-2 mb-2 question-type" onchange="updateQuestionType(this)">
      <option value="mcq">Multiple Choice</option>
      <option value="truefalse">True/False</option>
      <option value="short">Short Answer</option>
    </select>
    <input type="number" placeholder="Marks" class="border rounded px-3 py-2 mb-2 question-marks" style="width:100px" />
    <div class="question-options">
      <input type="text" placeholder="Option A" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option B" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option C" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option D" class="w-full border rounded px-3 py-2 mb-1" />
      <select class="border rounded px-3 py-2 question-answer">
        <option value="">Correct Answer</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>
  `;
  container.appendChild(div);
}

function updateQuestionType(select) {
  const optionsDiv = select.parentElement.querySelector('.question-options');
  const type = select.value;
  
  if (type === 'truefalse') {
    optionsDiv.innerHTML = `
      <select class="border rounded px-3 py-2 question-answer">
        <option value="">Correct Answer</option>
        <option value="True">True</option>
        <option value="False">False</option>
      </select>
    `;
  } else if (type === 'short') {
    optionsDiv.innerHTML = '<p class="text-sm text-gray-500">Students will type their answer (manual grading required)</p>';
  } else {
    optionsDiv.innerHTML = `
      <input type="text" placeholder="Option A" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option B" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option C" class="w-full border rounded px-3 py-2 mb-1" />
      <input type="text" placeholder="Option D" class="w-full border rounded px-3 py-2 mb-1" />
      <select class="border rounded px-3 py-2 question-answer">
        <option value="">Correct Answer</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    `;
  }
}

function saveExam() {
  const title = document.getElementById('exam-title').value;
  const subject = document.getElementById('exam-subject').value;
  const examClass = document.getElementById('exam-class').value;
  const duration = document.getElementById('exam-duration').value;
  const totalMarks = document.getElementById('exam-marks').value;
  const dueDate = document.getElementById('exam-due').value;
  const instructions = document.getElementById('exam-instructions').value;
  
  if (!title || !subject || !examClass || !duration || !totalMarks || !dueDate) {
    alert('Please fill all required fields');
    return;
  }
  
  const questions = [];
  document.querySelectorAll('#questions-container > div').forEach((qDiv, i) => {
    const text = qDiv.querySelector('.question-text').value;
    const type = qDiv.querySelector('.question-type').value;
    const marks = qDiv.querySelector('.question-marks').value;
    const optionsDiv = qDiv.querySelector('.question-options');
    
    let options = [];
    let correctAnswer = '';
    
    if (type === 'mcq') {
      const inputs = optionsDiv.querySelectorAll('input');
      options = Array.from(inputs).map(inp => inp.value);
      correctAnswer = optionsDiv.querySelector('.question-answer').value;
    } else if (type === 'truefalse') {
      options = ['True', 'False'];
      correctAnswer = optionsDiv.querySelector('.question-answer').value;
    }
    
    questions.push({ text, type, marks: parseInt(marks), options, correctAnswer });
  });
  
  if (questions.length === 0) {
    alert('Please add at least one question');
    return;
  }
  
  const exam = {
    id: Date.now().toString(),
    title, subject, class: examClass, duration: parseInt(duration),
    totalMarks: parseInt(totalMarks), dueDate, instructions, questions,
    createdBy: currentUser.userId, createdAt: new Date().toISOString()
  };
  
  exams.push(exam);
  localStorage.setItem(EXAMS_KEY, JSON.stringify(exams));
  alert('Exam created successfully!');
  showTab('list');
}

function deleteExam(id) {
  if (confirm('Delete this exam?')) {
    exams = exams.filter(e => e.id !== id);
    localStorage.setItem(EXAMS_KEY, JSON.stringify(exams));
    renderExamsList();
  }
}

function renderSubmissions() {
  const container = document.getElementById('submissions-list');
  const mySubs = submissions.filter(s => {
    const exam = exams.find(e => e.id === s.examId);
    return exam && exam.createdBy === currentUser.userId;
  });
  
  if (mySubs.length === 0) {
    container.innerHTML = '<p class="text-gray-500 text-center py-8">No submissions yet</p>';
    return;
  }
  
  container.innerHTML = mySubs.map(sub => {
    const exam = exams.find(e => e.id === sub.examId);
    return `
      <div class="border rounded-lg p-4 mb-4">
        <div class="flex justify-between">
          <div>
            <h3 class="font-bold">${sub.studentName}</h3>
            <p class="text-sm text-gray-600">${exam.title}</p>
            <p class="text-xs text-gray-500">Submitted: ${new Date(sub.submittedAt).toLocaleString()}</p>
          </div>
          <div class="text-right">
            <p class="text-lg font-bold ${sub.graded ? 'text-green-600' : 'text-orange-600'}">
              ${sub.graded ? sub.score + '/' + exam.totalMarks : 'Pending'}
            </p>
            ${!sub.graded ? `<button onclick="gradeSubmission('${sub.id}')" class="text-sm text-blue-600 mt-2">Grade Now</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function gradeSubmission(subId) {
  alert('Grading interface - Coming soon!');
}
</script>

</body>
</html>
